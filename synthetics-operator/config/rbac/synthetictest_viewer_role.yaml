# This rule is not used by the project synthetics-operator itself.
# It is provided to allow the cluster admin to help manage permissions for users.
#
# Grants read-only access to cache.the-grid.io resources.
# This role is intended for users who need visibility into these resources
# without permissions to modify them. It is ideal for monitoring purposes and limited-access viewing.

apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  labels:
    app.kubernetes.io/name: synthetics-operator
    app.kubernetes.io/managed-by: kustomize
  name: synthetictest-viewer-role
rules:
- apiGroups:
  - cache.the-grid.io
  resources:
  - synthetictests
  verbs:
  - get
  - list
  - watch
- apiGroups:
  - cache.the-grid.io
  resources:
  - synthetictests/status
  verbs:
  - get
