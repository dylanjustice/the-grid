# This rule is not used by the project synthetics-operator itself.
# It is provided to allow the cluster admin to help manage permissions for users.
#
# Grants permissions to create, update, and delete resources within the cache.the-grid.io.
# This role is intended for users who need to manage these resources
# but should not control RBAC or manage permissions for others.

apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  labels:
    app.kubernetes.io/name: synthetics-operator
    app.kubernetes.io/managed-by: kustomize
  name: synthetictestrun-editor-role
rules:
- apiGroups:
  - cache.the-grid.io
  resources:
  - synthetictestruns
  verbs:
  - create
  - delete
  - get
  - list
  - patch
  - update
  - watch
- apiGroups:
  - cache.the-grid.io
  resources:
  - synthetictestruns/status
  verbs:
  - get
