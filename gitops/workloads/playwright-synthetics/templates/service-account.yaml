{{if .Values.serviceAccount.create }}
apiVersion: v1
kind: ServiceAccount
metadata:
  name: {{ include "the-grid-playwright-synthetics.serviceAccountName" . }}
  labels:
    {{- include "the-grid-playwright-synthetics.labels" . | nindent 4 }}
  {{- with .Values.serviceAccount.annotations }}
  annotations:
    {{- toYaml . | nindent 4 }}
  {{- end }}
{{end}}